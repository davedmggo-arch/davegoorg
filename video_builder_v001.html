<style>
    body { margin: 0; padding: 0; background: transparent; }
    .evc-card { display: flex; align-items: stretch; background: #000; color: #fff; border-radius: 8px; overflow: hidden; width: 100%; max-width: 1000px; font-family: sans-serif; box-shadow: 0 4px 8px rgba(0,0,0,0.4); box-sizing: border-box; transition: all 0.3s ease; flex-direction: column; margin: 0 auto; }
    @media (min-width: 800px) { .evc-card { flex-direction: row; } }
    
    /* Fullscreen adjustments */
    .evc-card:fullscreen, .evc-card:-webkit-full-screen { max-width: none; width: 100vw; height: 100vh; border-radius: 0; margin: 0; }
    .evc-card:fullscreen .evc-video, .evc-card:-webkit-full-screen .evc-video { max-height: calc(100vh - 150px); }

    .evc-left-col { flex: 2; min-width: 300px; display: flex; flex-direction: column; }
    .evc-video { width: 100%; display: block; background: #111; max-height: 50vh; object-fit: contain; flex-shrink: 0; }
    .evc-controls { padding: 10px 15px; background: #222; display: flex; align-items: center; gap: 15px; border-bottom: 1px solid #333; min-height: 30px; }
    .evc-btn-cc { background: transparent; color: white; border: 1px solid #555; font-weight: bold; padding: 4px 8px; border-radius: 4px; cursor: pointer; transition: color 0.2s;}
    .evc-caption { flex-grow: 1; text-align: center; font-size: 16px; min-height: 1.5em; color: #fff; text-shadow: 1px 1px 2px #000; }
    .evc-btn-fs { background: transparent; color: #aaa; border: none; font-size: 20px; cursor: pointer; padding: 0 5px; }
    .evc-btn-fs:hover { color: #fff; }
    .evc-desc { padding: 15px; background: #1a1a1a; font-size: 15px; min-height: 80px; line-height: 1.5; flex-grow: 1; overflow-y: auto; }
    .evc-desc ul { margin-top: 5px; margin-bottom: 5px; padding-left: 20px; }
    .evc-right-col { flex: 1; min-width: 250px; background: #222; display: flex; flex-direction: column; border-left: 1px solid #333; }
    .evc-ch-header { padding: 15px; padding-bottom: 5px; }
    .evc-ch-list { list-style: none; padding: 15px; padding-top: 0; margin: 0; overflow-y: auto; flex-grow: 1; height: 0; scroll-behavior: smooth; }
    
    .evc-ts-btn { background: #333; color: #4da6ff; border: 1px solid #444; padding: 10px; width: 100%; text-align: left; border-radius: 4px; cursor: pointer; font-size: 14px; font-family: sans-serif; transition: background 0.2s, border-color 0.2s; }
    .evc-ts-btn:hover { background: #444; }
    .evc-ts-btn.active { background: #1a3b5c; border-color: #4da6ff; font-weight: bold; color: #fff; }
</style>

<div id="exportContainer" class="evc-card">
    <div class="evc-left-col">
        <video id="embedVideo" src="https://filedn.com/l2sG939QiPx0rp2J0fA1ciJ/3DI_Winter_2026/Images/106/Week%204/2_Dynamic_Lighting_And_Atmosphere.mp4" controls preload="metadata" class="evc-video"></video>
        <div class="evc-controls">
            <button id="embedCapToggle" class="evc-btn-cc">CC</button>
            <div id="embedCaption" class="evc-caption"></div>
            <button id="embedFsToggle" class="evc-btn-fs" title="Fullscreen">⛶</button>
        </div>
        <div id="embedDesc" class="evc-desc">Description will appear here.</div>
    </div>
    <div class="evc-right-col">
        <div class="evc-ch-header"><h3 style="margin: 0; font-size: 16px; color: #fff;">Chapters</h3></div>
        <ul class="evc-ch-list">
            <li style="margin-bottom: 10px;"><button id="embed-ts-btn-0" class="evc-ts-btn" onclick="document.getElementById('embedVideo').currentTime = 1; document.getElementById('embedVideo').play();">00:01 : asd</button></li><li style="margin-bottom: 10px;"><button id="embed-ts-btn-1" class="evc-ts-btn" onclick="document.getElementById('embedVideo').currentTime = 10; document.getElementById('embedVideo').play();">00:10 : asd</button></li>
        </ul>
    </div>
</div>

<script>
    (function() {
        const container = document.getElementById('exportContainer');
        const vid = document.getElementById('embedVideo');
        const cap = document.getElementById('embedCaption');
        const desc = document.getElementById('embedDesc');
        const capToggle = document.getElementById('embedCapToggle');
        const fsToggle = document.getElementById('embedFsToggle');
        
        const capsData = [];
        const tsData = [{"time":1,"label":"asd","desc":"asd"},{"time":10,"label":"asd","desc":"asd"}];
        let capsOn = true;
        let activeIndex = -1;

        capToggle.addEventListener('click', () => {
            capsOn = !capsOn;
            capToggle.style.color = capsOn ? "white" : "grey";
            if (!capsOn) cap.innerHTML = '';
        });

        fsToggle.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                if (container.requestFullscreen) container.requestFullscreen();
                else if (container.webkitRequestFullscreen) container.webkitRequestFullscreen();
                else if (container.msRequestFullscreen) container.msRequestFullscreen();
            } else {
                if (document.exitFullscreen) document.exitFullscreen();
                else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
                else if (document.msExitFullscreen) document.msExitFullscreen();
            }
        });

        vid.addEventListener('timeupdate', () => {
            const time = vid.currentTime;
            
            if (capsOn) {
                const activeCap = capsData.find(c => time >= c.start && time <= c.end);
                cap.innerHTML = activeCap ? activeCap.text : '';
            }

            if (tsData.length > 0) {
                let newIndex = -1;
                for (let i = tsData.length - 1; i >= 0; i--) {
                    if (time >= tsData[i].time) {
                        newIndex = i;
                        break;
                    }
                }

                if (newIndex !== activeIndex) {
                    activeIndex = newIndex;
                    
                    document.querySelectorAll('.evc-ts-btn').forEach(btn => btn.classList.remove('active'));
                    
                    if (activeIndex !== -1) {
                        desc.innerHTML = tsData[activeIndex].desc || "No description provided for this chapter.";
                        const activeBtn = document.getElementById('embed-ts-btn-' + activeIndex);
                        if (activeBtn) {
                            activeBtn.classList.add('active');
                            activeBtn.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                        }
                    } else {
                        desc.innerHTML = tsData[0].desc || "No description provided.";
                        const firstBtn = document.getElementById('embed-ts-btn-0');
                        if (firstBtn) firstBtn.classList.add('active');
                    }
                }
            }
        });
    })();
</script>
